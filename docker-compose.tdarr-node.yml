services:
  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:latest
    container_name: tdarr-node
    restart: unless-stopped
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "983"   # video
      - "987"   # render
    environment:
      - TZ=${TZ:-America/Chicago}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK_SET=002
      - serverIP=${TDARR_SERVER_IP:-192.168.1.100}
      - serverPort=${TDARR_SERVER_PORT:-8266}
      - nodeName=${TDARR_NODE_NAME:-tdarr-node-1}
      - nodeIP=${TDARR_NODE_IP:-0.0.0.0}
      - nodePort=${TDARR_NODE_PORT:-8267}
      - inContainer=true
      - ffmpegVersion=7
    volumes:
      - tdarr-configs:/app/configs
      - tdarr-logs:/app/logs
      - ${TDARR_CACHE_ROOT:-/path/to/transcode_cache}:/temp
      - ${MEDIA_ROOT:-/path/to/media}/library/movies:/media/movies
      - ${MEDIA_ROOT:-/path/to/media}/library/tv:/media/tv

volumes:
  tdarr-configs:
  tdarr-logs:
